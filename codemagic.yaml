workflows:
  telegram-testflight:
    name: Telegram TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppStoreConnectKey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.andrew.telegram
      xcode: 26.4.1
      vars:
        TEAM_ID: "88B94BV9BX"
        BUNDLE_ID: "com.andrew.telegram"
    scripts:
      - name: Initialize submodules
        script: |
          git submodule update --init --recursive
      - name: Set up codesigning
        script: |
          mkdir -p /tmp/cs/profiles
          cp ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision /tmp/cs/profiles/ 2>/dev/null || true
          ls /tmp/cs/profiles/
      - name: Install Metal Toolchain
        script: |
          xcodebuild -downloadComponent MetalToolchain
      - name: Build IPA
        script: |
          echo "build --//Telegram:disableExtensions" >> .bazelrc
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir ~/telegram-bazel-cache \
            build \
            --configurationPath build-system/personal-configuration.json \
            --codesigningInformationPath /tmp/cs \
            --buildNumber=1 \
            --configuration=release_arm64 \
            --outputBuildArtifactsPath build/
    artifacts:
      - build/**/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  telegram-ios-simulator:
    name: Telegram iOS - Simulator
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default
      vars:
        TELEGRAM_CONFIG_PATH: "build-system/telegram-ci-configuration.json"

    scripts:
      - name: Sync submodules
        script: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Generate Xcode project
        script: |
          set -euo pipefail
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            generateProject \
            --configurationPath="$CM_BUILD_DIR/$TELEGRAM_CONFIG_PATH" \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles

      - name: Find generated Xcode project
        script: |
          set -euo pipefail
          find "$CM_BUILD_DIR" \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) -print

      - name: Build for iOS Simulator
        script: |
          set -euo pipefail

          WORKSPACE="$(find "$CM_BUILD_DIR" -name "*.xcworkspace" | head -n 1)"
          PROJECT="$(find "$CM_BUILD_DIR" -name "*.xcodeproj" | head -n 1)"

          if [ -n "${WORKSPACE:-}" ]; then
            xcodebuild build \
              -workspace "$WORKSPACE" \
              -scheme "Telegram" \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            xcodebuild build \
              -project "$PROJECT" \
              -scheme "Telegram" \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

